version: "3.9"

# lex-soft platform
#
# One-time setup — build the Linux lex binary:
#   ./build-lex-linux.sh
#
# Then start (fast — just copies the pre-built binary):
#   docker compose up --build -d
#
# For the EV fleet demo, use lex-ev-fleet/docker-compose.yml instead.
#
# Dashboard:  http://localhost:9000/

services:

  # ── Postgres ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexsoft
      POSTGRES_USER: lex
      POSTGRES_PASSWORD: lex
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lex -d lexsoft"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Platform server ───────────────────────────────────────────────
  platform:
    build:
      context: ..
      dockerfile: lex-soft/Dockerfile
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      PORT: "9000"
      DB_URL: "postgres://lex:lex@postgres:5432/lexsoft"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
